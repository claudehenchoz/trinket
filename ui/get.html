<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Get Trinket</title>
<style>
:root {
    color-scheme: light dark;
    --bg:           light-dark(#f9fafb, #111827);
    --surface:      light-dark(#ffffff, #1f2937);
    --border:       light-dark(#e5e7eb, #374151);
    --border-focus: light-dark(#2563eb, #60a5fa);
    --text:         light-dark(#111827, #f9fafb);
    --muted:        light-dark(#6b7280, #9ca3af);
    --accent:       light-dark(#2563eb, #60a5fa);
    --row-hover:    light-dark(#f3f4f6, #1f2937);
    --row-sel:      light-dark(#dbeafe, #1e3a5f);
    --row-sel-txt:  light-dark(#1e40af, #93c5fd);
    --th-bg:        light-dark(#f3f4f6, #161d2c);
    --tooltip-bg:   light-dark(#1f2937, #374151);
    --tooltip-txt:  #f9fafb;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    overflow: hidden;
}
#root {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 10px;
    gap: 6px;
}
#search {
    width: 100%;
    flex-shrink: 0;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 12px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.12s;
}
#search:focus { border-color: var(--border-focus); }
#search::placeholder { color: var(--muted); }
#hint {
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
    user-select: none;
}
#list-wrap {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    position: relative;
    /* Scrollbar styling */
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
}
#list-header {
    position: sticky;
    top: 0;
    z-index: 2;
    display: flex;
    align-items: center;
    background: var(--th-bg);
    border-bottom: 1px solid var(--border);
    padding: 0 10px;
    height: 28px;
    font-size: 10.5px;
    color: var(--accent);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    user-select: none;
}
#hdr-preview { flex: 1; }
#hdr-date    { flex-shrink: 0; width: 128px; text-align: right; }

/* Virtual scroll container */
#list-body { position: relative; }

.v-spacer { pointer-events: none; }

.row {
    display: flex;
    align-items: center;
    height: 38px;
    padding: 0 10px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    user-select: none;
    transition: background 0.06s;
}
.row:hover    { background: var(--row-hover); }
.row.selected { background: var(--row-sel); color: var(--row-sel-txt); }
.col-preview {
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 12.5px;
}
.col-date {
    flex-shrink: 0;
    width: 128px;
    text-align: right;
    font-size: 11px;
    color: var(--muted);
    margin-left: 10px;
}
.row.selected .col-date { color: var(--row-sel-txt); opacity: 0.75; }

/* Tooltip */
#tooltip {
    position: fixed;
    z-index: 9999;
    background: var(--tooltip-bg);
    color: var(--tooltip-txt);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 11px;
    font-family: 'Fira Code', 'Cascadia Code', Consolas, monospace;
    max-width: 480px;
    max-height: 280px;
    white-space: pre-wrap;
    word-break: break-word;
    overflow: hidden;
    pointer-events: none;
    display: none;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.35);
}
</style>
</head>
<body>
<div id="root">
  <input id="search" type="text" placeholder="Search snippets…"
         autocomplete="off" spellcheck="false">
  <div id="hint">↑↓ PgUp PgDn — navigate &nbsp;·&nbsp; Enter — copy &amp; close &nbsp;·&nbsp; Esc — close</div>
  <div id="list-wrap">
    <div id="list-header">
      <span id="hdr-preview">Preview</span>
      <span id="hdr-date">Modified</span>
    </div>
    <div id="list-body"></div>
  </div>
</div>
<div id="tooltip"></div>

<script>
(async () => {
  const { invoke }           = window.__TAURI__.core;
  const { getCurrentWindow } = window.__TAURI__.window;
  const { listen }           = window.__TAURI__.event;

  const win    = getCurrentWindow();
  const search = document.getElementById('search');
  const lbody  = document.getElementById('list-body');
  const wrap   = document.getElementById('list-wrap');
  const tip    = document.getElementById('tooltip');

  const ROW_H  = 38;   // px — must match CSS .row height
  const BUFFER = 6;    // extra rows rendered above/below viewport

  let rows     = [];   // current result set
  let selected = -1;   // selected row index
  let reqId    = 0;    // request counter for stale-response detection
  let debT     = null;

  // ── Date formatting ──────────────────────────────────────────────────────
  function fmtDate(ms) {
    const d = new Date(ms);
    const z = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${z(d.getMonth() + 1)}-${z(d.getDate())} `
         + `${z(d.getHours())}:${z(d.getMinutes())}`;
  }

  // ── Virtual scroll renderer ──────────────────────────────────────────────
  function renderVirtual() {
    const scrollTop = wrap.scrollTop;
    const viewH     = wrap.clientHeight - 28; // subtract sticky header height
    const start = Math.max(0, Math.floor(scrollTop / ROW_H) - BUFFER);
    const end   = Math.min(rows.length, Math.ceil((scrollTop + viewH) / ROW_H) + BUFFER);

    const frag = document.createDocumentFragment();

    if (start > 0) {
      const sp = document.createElement('div');
      sp.className = 'v-spacer';
      sp.style.height = (start * ROW_H) + 'px';
      frag.appendChild(sp);
    }

    for (let i = start; i < end; i++) {
      frag.appendChild(makeRow(i));
    }

    if (end < rows.length) {
      const sp = document.createElement('div');
      sp.className = 'v-spacer';
      sp.style.height = ((rows.length - end) * ROW_H) + 'px';
      frag.appendChild(sp);
    }

    lbody.innerHTML = '';
    lbody.appendChild(frag);
  }

  function makeRow(i) {
    const item = rows[i];
    const div  = document.createElement('div');
    div.className = 'row' + (i === selected ? ' selected' : '');

    const colP = document.createElement('span');
    colP.className = 'col-preview';
    colP.textContent = item.preview;

    const colD = document.createElement('span');
    colD.className = 'col-date';
    colD.textContent = fmtDate(item.modified_at);

    div.appendChild(colP);
    div.appendChild(colD);

    div.addEventListener('click', () => { selectRow(i); search.focus(); });
    div.addEventListener('dblclick', copyAndClose);
    div.addEventListener('mousemove', e => showTip(e, item.content));
    div.addEventListener('mouseleave', hideTip);
    return div;
  }

  function selectRow(i) {
    if (i < 0 || i >= rows.length) {
      selected = -1;
      renderVirtual();
      return;
    }
    selected = i;
    // Scroll to keep the selected row visible, then re-render.
    const rowTop    = i * ROW_H;
    const rowBottom = rowTop + ROW_H;
    const viewTop   = wrap.scrollTop;
    const viewBot   = viewTop + wrap.clientHeight - 28;
    if (rowTop < viewTop) {
      wrap.scrollTop = rowTop;
    } else if (rowBottom > viewBot) {
      wrap.scrollTop = rowBottom - (wrap.clientHeight - 28);
    }
    renderVirtual();
  }

  wrap.addEventListener('scroll', renderVirtual, { passive: true });

  // ── Tooltip ──────────────────────────────────────────────────────────────
  function showTip(e, content) {
    tip.textContent = content.length > 900
      ? content.slice(0, 900) + '\n[…]'
      : content;
    tip.style.display = 'block';
    moveTip(e);
  }
  function moveTip(e) {
    tip.style.left = Math.min(e.clientX + 14, window.innerWidth  - 496) + 'px';
    tip.style.top  = Math.min(e.clientY + 14, window.innerHeight - 296) + 'px';
  }
  function hideTip() { tip.style.display = 'none'; }

  // ── Data loading ─────────────────────────────────────────────────────────
  async function loadSnippets(q) {
    const id = ++reqId;
    try {
      const data = await invoke('cmd_get_snippets', {
        query: q && q.trim() ? q : null,
      });
      if (id !== reqId) return; // superseded by a newer request — discard
      rows     = data;
      selected = rows.length > 0 ? 0 : -1;
      wrap.scrollTop = 0;
      renderVirtual();
    } catch (e) {
      if (id === reqId) console.error('cmd_get_snippets failed:', e);
    }
  }

  // ── Copy selected snippet to clipboard and close ─────────────────────────
  async function copyAndClose() {
    if (selected < 0 || selected >= rows.length) return;
    try {
      await navigator.clipboard.writeText(rows[selected].content);
      await win.hide();
    } catch (e) {
      console.error('clipboard write failed:', e);
    }
  }

  // ── Keyboard navigation (search always keeps focus) ──────────────────────
  search.addEventListener('keydown', e => {
    switch (e.key) {
      case 'ArrowDown':
        e.preventDefault();
        selectRow(Math.min(selected + 1, rows.length - 1));
        break;
      case 'ArrowUp':
        e.preventDefault();
        selectRow(Math.max(selected - 1, 0));
        break;
      case 'PageDown':
        e.preventDefault();
        selectRow(Math.min(selected + 5, rows.length - 1));
        break;
      case 'PageUp':
        e.preventDefault();
        selectRow(Math.max(selected - 5, 0));
        break;
      case 'Enter':
        e.preventDefault();
        copyAndClose();
        break;
      case 'Escape':
        e.preventDefault();
        win.hide();
        break;
    }
    // Ensure focus stays on the search box after navigation
    search.focus();
  });

  search.addEventListener('input', () => {
    clearTimeout(debT);
    debT = setTimeout(() => loadSnippets(search.value), 50);
  });

  // ── Reset event emitted by Rust when window is shown ────────────────────
  await listen('reset', async () => {
    search.value = '';
    await loadSnippets('');
    search.focus();
  });

  // ── Initial load ─────────────────────────────────────────────────────────
  await loadSnippets('');
  search.focus();
})();
</script>
</body>
</html>
